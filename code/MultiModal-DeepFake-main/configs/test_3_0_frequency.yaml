train_file:
- /root/autodl-tmp/datasets/DGM4/metadata/trainval.json
val_file:
- /root/autodl-tmp/datasets/DGM4/metadata/test_3_0.json
image_res: 256
vision_width: 768
embed_dim: 256
batch_size_train: 16
batch_size_val: 64
max_words: 50
freq_hidden_dim: 128
freq_num_heads: 8
loss_BIC_wgt: 0.2
loss_bbox_wgt: 1
loss_giou_wgt: 1
loss_MLC_wgt: 0.2
Loss_sim_wgt: 5
Loss_freq_wgt: 1
optimizer:
  opt: adamW
  lr: 1.0e-06
  lr_img: 3.0e-06
  weight_decay: 0.02
schedular:
  sched: cosine
  lr: 1.0e-06
  epochs: 10
  min_lr: 1.0e-07
  decay_rate: 1
  warmup_lr: 1.0e-07
  warmup_epochs: 1
  cooldown_epochs: 0

train_file: ["/root/autodl-tmp/datasets/DGM4/metadata/trainval.json"] # use train and val set together
val_file: ["/root/autodl-tmp/datasets/DGM4/metadata/test.json"]           

image_res: 256
vision_width: 768
embed_dim: 256
batch_size_train: 16
batch_size_val: 64
max_words: 50

loss_BIC_wgt: 1
loss_bbox_wgt: 0.1
loss_giou_wgt: 0.1
loss_MLC_wgt: 1
Loss_sim_wgt: 10

optimizer: {opt: adamW, lr: 0.000002, lr_img: 0.00001, weight_decay: 0.02}
schedular: {sched: cosine, lr: 0.000002, epochs: 50, min_lr: 0.0000002, decay_rate: 1, warmup_lr: 0.0000002, warmup_epochs: 10, cooldown_epochs: 0}








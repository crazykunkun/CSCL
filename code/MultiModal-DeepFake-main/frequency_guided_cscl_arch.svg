<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="780" viewBox="0 0 1900 780">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#222" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d62728" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2ca02c" />
    </marker>
    <style>
      .title { font: 700 26px Arial, sans-serif; fill: #111; }
      .label { font: 16px Arial, sans-serif; fill: #111; }
      .small { font: 13px Arial, sans-serif; fill: #111; }
      .tiny { font: 11px Arial, sans-serif; fill: #333; }
      .groupTitle { font: 700 20px Arial, sans-serif; fill: #111; }
      .group { fill: #fff; stroke: #111; stroke-width: 3; stroke-dasharray: 10 7; }
      .image { fill: #ffe5e5; stroke: #d62728; stroke-width: 2; }
      .text { fill: #e8f6e8; stroke: #2ca02c; stroke-width: 2; }
      .freq { fill: #f1e6ff; stroke: #7b2cbf; stroke-width: 2; }
      .fusion { fill: #fff4cc; stroke: #d4a017; stroke-width: 2; }
      .head { fill: #f2f2f2; stroke: #333; stroke-width: 2; }
      .block { fill: #ffffff; stroke: #333; stroke-width: 2; }
      .arrow { stroke: #222; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .arrowRed { stroke: #d62728; stroke-width: 2.5; fill: none; marker-end: url(#arrowRed); }
      .arrowGreen { stroke: #2ca02c; stroke-width: 2.5; fill: none; marker-end: url(#arrowGreen); }
      .dash { stroke: #555; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="950" y="35" text-anchor="middle" class="title">Frequency-guided CSCL Architecture</text>

  <!-- Inputs -->
  <rect x="30" y="95" width="210" height="125" rx="8" class="image" />
  <text x="135" y="150" text-anchor="middle" class="label">Image Input</text>
  <text x="135" y="175" text-anchor="middle" class="small">RGB Image</text>

  <rect x="30" y="500" width="210" height="105" rx="8" class="text" />
  <text x="135" y="545" text-anchor="middle" class="label">Text Input</text>
  <text x="135" y="570" text-anchor="middle" class="small">Caption / News Text</text>

  <!-- Multi-modal Encoder -->
  <rect x="280" y="70" width="330" height="580" class="group" />
  <text x="445" y="675" text-anchor="middle" class="groupTitle">Multi-modal Encoder</text>

  <rect x="315" y="110" width="105" height="90" rx="12" class="image" />
  <text x="367" y="148" text-anchor="middle" class="small">Image</text>
  <text x="367" y="168" text-anchor="middle" class="small">Encoder</text>
  <rect x="315" y="515" width="105" height="90" rx="12" class="text" />
  <text x="367" y="553" text-anchor="middle" class="small">Text</text>
  <text x="367" y="573" text-anchor="middle" class="small">Encoder</text>

  <rect x="455" y="255" width="95" height="165" rx="12" class="block" />
  <text x="502" y="315" text-anchor="middle" class="small">Cross-modal</text>
  <text x="502" y="337" text-anchor="middle" class="small">Interaction</text>
  <text x="502" y="363" text-anchor="middle" class="tiny">METER</text>

  <rect x="565" y="125" width="24" height="24" class="image" />
  <text x="577" y="115" text-anchor="middle" class="tiny">V_cls</text>
  <g transform="translate(555 195)">
    <rect x="0" y="0" width="18" height="18" class="image"/><rect x="22" y="0" width="18" height="18" class="image"/><rect x="44" y="0" width="18" height="18" class="image"/><rect x="66" y="0" width="18" height="18" class="image"/>
  </g>
  <text x="597" y="235" text-anchor="middle" class="tiny">V_pat</text>

  <rect x="565" y="515" width="24" height="24" class="text" />
  <text x="577" y="555" text-anchor="middle" class="tiny">T_cls</text>
  <g transform="translate(555 585)">
    <rect x="0" y="0" width="18" height="18" class="text"/><rect x="22" y="0" width="18" height="18" class="text"/><rect x="44" y="0" width="18" height="18" class="text"/><rect x="66" y="0" width="18" height="18" class="text"/>
  </g>
  <text x="597" y="625" text-anchor="middle" class="tiny">T_tok</text>

  <rect x="560" y="325" width="38" height="38" rx="5" class="fusion" />
  <text x="579" y="388" text-anchor="middle" class="tiny">CLS</text>

  <!-- Frequency Branch -->
  <rect x="650" y="70" width="350" height="250" class="group" />
  <text x="825" y="345" text-anchor="middle" class="groupTitle">Frequency Branch</text>
  <rect x="680" y="105" width="80" height="45" rx="8" class="freq" /><text x="720" y="133" text-anchor="middle" class="tiny">SRM</text>
  <rect x="680" y="160" width="80" height="45" rx="8" class="freq" /><text x="720" y="188" text-anchor="middle" class="tiny">DCT</text>
  <rect x="680" y="215" width="80" height="45" rx="8" class="freq" /><text x="720" y="243" text-anchor="middle" class="tiny">FFT</text>
  <rect x="680" y="270" width="80" height="35" rx="8" class="freq" /><text x="720" y="293" text-anchor="middle" class="tiny">Wavelet</text>
  <rect x="795" y="150" width="80" height="85" rx="10" class="freq" /><text x="835" y="185" text-anchor="middle" class="tiny">Concat</text><text x="835" y="205" text-anchor="middle" class="tiny">8-ch maps</text>
  <rect x="905" y="145" width="70" height="95" rx="10" class="freq" /><text x="940" y="178" text-anchor="middle" class="tiny">CNN</text><text x="940" y="198" text-anchor="middle" class="tiny">Encoder</text><text x="940" y="218" text-anchor="middle" class="tiny">ConvNeXt</text>

  <!-- Frequency Guided Fusion -->
  <rect x="1045" y="155" width="190" height="110" rx="14" class="fusion" />
  <text x="1140" y="190" text-anchor="middle" class="label">Frequency Guided</text>
  <text x="1140" y="214" text-anchor="middle" class="label">Fusion</text>
  <text x="1140" y="240" text-anchor="middle" class="tiny">Cross Attention + Gate + Residual</text>

  <!-- Contextual Consistency Decoder -->
  <rect x="650" y="380" width="585" height="270" class="group" />
  <text x="942" y="675" text-anchor="middle" class="groupTitle">Contextual Consistency Decoder</text>
  <rect x="690" y="415" width="120" height="70" rx="10" class="image" /><text x="750" y="443" text-anchor="middle" class="tiny">Image Consistency</text><text x="750" y="463" text-anchor="middle" class="tiny">Processor</text>
  <rect x="840" y="410" width="105" height="80" rx="10" class="image" /><text x="892" y="435" text-anchor="middle" class="tiny">M_pat</text><text x="892" y="455" text-anchor="middle" class="tiny">Contextual</text><text x="892" y="475" text-anchor="middle" class="tiny">Consistency</text>
  <rect x="975" y="410" width="210" height="80" rx="10" class="image" /><text x="1080" y="440" text-anchor="middle" class="tiny">Image Forgery-aware Reasoning</text><text x="1080" y="465" text-anchor="middle" class="tiny">Reliable / Suspicious Blocks</text>

  <rect x="690" y="530" width="120" height="70" rx="10" class="text" /><text x="750" y="558" text-anchor="middle" class="tiny">Text Consistency</text><text x="750" y="578" text-anchor="middle" class="tiny">Processor</text>
  <rect x="840" y="525" width="105" height="80" rx="10" class="text" /><text x="892" y="550" text-anchor="middle" class="tiny">M_tok</text><text x="892" y="570" text-anchor="middle" class="tiny">Contextual</text><text x="892" y="590" text-anchor="middle" class="tiny">Consistency</text>
  <rect x="975" y="525" width="210" height="80" rx="10" class="text" /><text x="1080" y="555" text-anchor="middle" class="tiny">Text Forgery-aware Reasoning</text><text x="1080" y="580" text-anchor="middle" class="tiny">Reliable / Suspicious Blocks</text>

  <!-- Semantic Consistency Decoder -->
  <rect x="1280" y="160" width="360" height="490" class="group" />
  <text x="1460" y="675" text-anchor="middle" class="groupTitle">Semantic Consistency Decoder</text>
  <rect x="1315" y="230" width="140" height="105" rx="12" class="image" /><text x="1385" y="260" text-anchor="middle" class="tiny">Image Semantic</text><text x="1385" y="280" text-anchor="middle" class="tiny">Consistency</text><text x="1385" y="305" text-anchor="middle" class="tiny">S_pat with T_g</text>
  <rect x="1485" y="230" width="120" height="105" rx="12" class="image" /><text x="1545" y="260" text-anchor="middle" class="tiny">Image</text><text x="1545" y="280" text-anchor="middle" class="tiny">Forgery-aware</text><text x="1545" y="300" text-anchor="middle" class="tiny">Aggregating</text>

  <rect x="1315" y="465" width="140" height="105" rx="12" class="text" /><text x="1385" y="495" text-anchor="middle" class="tiny">Text Semantic</text><text x="1385" y="515" text-anchor="middle" class="tiny">Consistency</text><text x="1385" y="540" text-anchor="middle" class="tiny">S_tok with V_g</text>
  <rect x="1485" y="465" width="120" height="105" rx="12" class="text" /><text x="1545" y="495" text-anchor="middle" class="tiny">Text</text><text x="1545" y="515" text-anchor="middle" class="tiny">Forgery-aware</text><text x="1545" y="535" text-anchor="middle" class="tiny">Aggregating</text>

  <!-- Output heads -->
  <rect x="1690" y="120" width="145" height="55" rx="8" class="head" /><text x="1762" y="142" text-anchor="middle" class="tiny">Binary Classifier</text><text x="1762" y="160" text-anchor="middle" class="tiny">Real / Fake</text>
  <rect x="1690" y="245" width="145" height="55" rx="8" class="head" /><text x="1762" y="267" text-anchor="middle" class="tiny">FS / FA Classifier</text><text x="1762" y="285" text-anchor="middle" class="tiny">Image Type</text>
  <rect x="1690" y="325" width="145" height="55" rx="8" class="head" /><text x="1762" y="347" text-anchor="middle" class="tiny">BBox Detector</text><text x="1762" y="365" text-anchor="middle" class="tiny">Forged Box</text>
  <rect x="1690" y="485" width="145" height="55" rx="8" class="head" /><text x="1762" y="507" text-anchor="middle" class="tiny">TS / TA Classifier</text><text x="1762" y="525" text-anchor="middle" class="tiny">Text Type</text>
  <rect x="1690" y="565" width="145" height="55" rx="8" class="head" /><text x="1762" y="587" text-anchor="middle" class="tiny">Token Localization</text><text x="1762" y="605" text-anchor="middle" class="tiny">Forged Tokens</text>

